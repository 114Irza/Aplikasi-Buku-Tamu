<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Form Styling */
        .form-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #c0b8e8;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #f0f0f0;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 90px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Messages List */
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: #c0b8e8;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8888aa;
            font-style: italic;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 18px 22px;
            margin-bottom: 12px;
            transition: transform 0.2s, background 0.2s;
        }

        .message-card:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.08);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .message-name {
            font-weight: 700;
            font-size: 1rem;
            color: #a78bfa;
        }

        .message-time {
            font-size: 0.78rem;
            color: #777799;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #d0d0d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Buku Tamu</h1>

        <!-- Form Input -->
        <div class="form-card">
            <form method="POST" action="/">
                <div class="form-group">
                    <label for="name">Nama</label>
                    <input type="text" id="name" name="name" placeholder="Masukkan nama Anda" required>
                </div>
                <div class="form-group">
                    <label for="message">Pesan</label>
                    <textarea id="message" name="message" placeholder="Tulis pesan Anda di sini..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Kirim Pesan</button>
            </form>
        </div>

        <!-- Daftar Pesan -->
        <h2 class="section-title">Pesan Terbaru ({{ messages|length }})</h2>

        {% if messages %}
            {% for msg in messages %}
            <div class="message-card">
                <div class="message-header">
                    <span class="message-name">{{ msg.name }}</span>
                    <span class="message-time">{{ msg.created_at.strftime('%d %b %Y, %H:%M') }}</span>
                </div>
                <p class="message-text">{{ msg.message }}</p>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">Belum ada pesan. Jadilah yang pertama menulis!</div>
        {% endif %}
    </div>
</body>
</html>
